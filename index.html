<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>费婉燕 | 阿尔吉侬的语义花束</title>

    <!-- SEO & 社交分享 -->
    <meta name="description" content="费婉燕（Fiona）的个人作品集 —— 浙大研一 · AI产品经理 · AIGC创作者。曾在阿里千问、百度、拜耳实习，抖音黑客松长三角选拔赛冠军。" />
    <meta name="author" content="费婉燕 Fiona" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="费婉燕 | 阿尔吉侬的语义花束" />
    <meta property="og:description" content="浙大研一 · AI产品经理 · AIGC创作者。一个人类学家式的背包客，正在 AI 的旷野中探索。" />
    <meta property="og:image" content="https://fiona309.github.io/new-fiona-website/photo.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#FDF6E3" />

    <!-- 表情 favicon（花，呼应主题） -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Noto Serif SC for headings, Nunito for soft body text -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'algernon-canvas': '#FDF6E3', // 羊皮纸米黄
              'algernon-ink': '#2C3E50',    // 深灰蓝墨水
              'algernon-teal': '#34675C',   // 复古蓝绿
              'algernon-coral': '#E77C62',  // 珊瑚橘
              'algernon-pink': '#FAD0C4',   // 淡粉
              'algernon-warm-gray': '#E8E4D9',
            },
            fontFamily: {
              serif: ['"Noto Serif SC"', 'serif'],
              sans: ['"Nunito"', 'sans-serif'],
            },
            scale: {
              '115': '1.15',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'fade-up': 'fadeUp 1s ease-out forwards',
              'wiggle': 'wiggle 1s ease-in-out infinite',
              'spin-slow': 'spin 30s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              fadeUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              wiggle: {
                '0%, 100%': { transform: 'rotate(-3deg)' },
                '50%': { transform: 'rotate(3deg)' },
              },
              spin: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              }
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(231, 124, 98, 0.15)',
              'polaroid': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
              // 暖色调玻璃阴影：柔和、带墨蓝底色，配合 backdrop-blur 的毛玻璃质感
              'glass': '0 8px 32px -8px rgba(44, 62, 80, 0.12), 0 2px 8px -2px rgba(44, 62, 80, 0.08)',
            }
          }
        }
      }
    </script>
    
    <style>
      /* Global Noise Texture - Very subtle paper feel */
      .noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 50;
        opacity: 0.03; /* Reduced opacity for cleaner look */
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* 标题断行：避免末行孤字 / 标点压行 */
      h1, h2, h3 { text-wrap: balance; }
      p { text-wrap: pretty; }

      /* Hide scrollbar for cleaner aesthetic */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #FDF6E3;
      }
      ::-webkit-scrollbar-thumb {
        background: #34675C;
        border-radius: 10px;
        opacity: 0.5;
      }

      /* 键盘焦点环（无障碍）—— 鼠标点击不显示，仅键盘导航时出现 */
      :focus-visible {
        outline: 2px solid #E77C62;
        outline-offset: 3px;
        border-radius: 6px;
      }

      /* 按钮 / 链接按压反馈：物理下沉感 */
      a, button { transition: transform 0.18s ease, box-shadow 0.25s ease, background-color 0.25s ease, color 0.25s ease; }
      a:active, button:active { transform: scale(0.97); }

      /* 毛玻璃边缘高光：1px 内描边 + 顶部微光，模拟玻璃折射边 */
      .glass-edge {
        box-shadow:
          inset 0 1px 0 0 rgba(255, 255, 255, 0.6),
          inset 0 0 0 1px rgba(255, 255, 255, 0.25),
          0 8px 32px -8px rgba(44, 62, 80, 0.14);
      }

      /* 滚动入场动画：默认隐藏下移，进入视口后淡入上浮（由 IntersectionObserver 加 .in-view）
         使用独立的 translate 属性而非 transform，避免与 Tailwind 的 rotate/scale/hover transform 冲突 */
      .reveal {
        opacity: 0;
        translate: 0 28px;
        transition: opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1), translate 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        transition-delay: var(--reveal-delay, 0ms);
        will-change: opacity, translate;
      }
      .reveal.in-view {
        opacity: 1;
        translate: 0 0;
      }

      /* 尊重系统“减少动态效果”偏好 */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
        .reveal { opacity: 1 !important; transform: none !important; }
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased bg-algernon-canvas text-algernon-ink selection:bg-algernon-pink selection:text-algernon-teal">
    <div id="root"></div>

</body>
</html>
